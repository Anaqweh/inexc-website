<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="بوابة المتدرب — INEXC Innovative Excellence">
  <title>حسابي | INEXC — بوابة المتدرب</title>
  <link rel="icon" type="image/png" href="assets/inexc-icon.png">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/trainee-portal.css">
</head>
<body class="portal-body">

<div id="portalRoot">
  <div class="auth-panel" style="min-height:100vh">
    <div class="auth-card" style="text-align:center">
      <p style="padding:40px;color:var(--muted)">جاري تحميل بوابة المتدرب...</p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="js/course-career-map.js"></script>
<script src="js/trainee-auth.js"></script>
<script src="js/trainee-portal.js"></script>
<script>
  (async function init() {
    const params = new URLSearchParams(location.search);
    const legacyToken = params.get('token') || params.get('access_token');

    try {
      let session = await TraineeAuth.getSession();

      if (!session?.user && legacyToken) {
        const { data: reg } = await supabaseClient
          .from('registrations')
          .select('*')
          .eq('access_token', legacyToken)
          .maybeSingle();

        if (reg?.email) {
          document.getElementById('portalRoot').innerHTML = `
            <div class="auth-panel" style="min-height:100vh">
              <div class="auth-card">
                <h2 style="margin-bottom:12px;color:var(--navy)">مرحباً ${TraineeAuth.escapeHtml(reg.full_name)}</h2>
                <p style="color:var(--muted);margin-bottom:20px;font-size:0.92rem">
                  لديك رابط قديم للحساب. أنشئ حساباً بالبريد <strong dir="ltr">${TraineeAuth.escapeHtml(reg.email)}</strong>
                  للوصول إلى البوابة الكاملة.
                </p>
                <a href="login.html" class="btn btn-primary" style="display:inline-flex;width:auto">إنشاء / تسجيل الدخول</a>
                <div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--border)">
                  <p style="font-size:0.85rem;color:var(--muted);margin-bottom:12px">عرض سريع للتسجيل السابق:</p>
                  <p><strong>${TraineeAuth.escapeHtml(reg.course_name)}</strong> — ${reg.status || 'pending'}</p>
                </div>
              </div>
            </div>`;
          return;
        }
      }

      if (!session?.user) {
        location.href = 'login.html';
        return;
      }

      const profile = await TraineeAuth.ensureProfile(session.user);
      if (!profile) throw new Error('تعذّر تحميل الملف الشخصي');

      const data = await TraineeAuth.loadDashboardData(profile);
      TraineePortal.renderPortal(data);
    } catch (err) {
      console.error(err);
      document.getElementById('portalRoot').innerHTML = `
        <div class="auth-panel" style="min-height:100vh">
          <div class="auth-card">
            <p class="auth-msg visible error">${TraineeAuth.escapeHtml(err.message || 'حدث خطأ')}</p>
            <p style="margin-top:16px;font-size:0.88rem;color:var(--muted)">
              تأكد من تنفيذ <code>trainee-portal-setup.sql</code> في Supabase وتفعيل Email Auth.
            </p>
            <a href="login.html" class="btn btn-primary" style="margin-top:20px;display:inline-flex;width:auto">تسجيل الدخول</a>
          </div>
        </div>`;
    }
  })();
</script>
<script src="whatsapp-float.js"></script>
</body>
</html>
