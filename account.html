<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>بوابة المتدرب | INEXC</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Tajawal,sans-serif;
    }

    body{
      background:#eef2f7;
    }

    .loading-screen{
      position:fixed;
      inset:0;
      background:#102a5c;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      z-index:9999;
    }

    .spinner{
      width:60px;
      height:60px;
      border:5px solid rgba(255,255,255,0.2);
      border-top:5px solid #d8b36a;
      border-radius:50%;
      animation:spin 1s linear infinite;
      margin-bottom:20px;
    }

    @keyframes spin{
      100%{
        transform:rotate(360deg);
      }
    }

    .dashboard{
      display:none;
      padding:30px;
    }

    .topbar{
      background:#102a5c;
      padding:15px 25px;
      border-radius:15px;
      color:white;
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:25px;
    }

    .user-box{
      background:white;
      border-radius:20px;
      padding:25px;
      display:flex;
      align-items:center;
      gap:20px;
      box-shadow:0 5px 20px rgba(0,0,0,0.05);
      margin-bottom:25px;
    }

    .avatar{
      width:90px;
      height:90px;
      border-radius:50%;
      background:#102a5c;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:32px;
      font-weight:bold;
    }

    .user-info h2{
      color:#102a5c;
      margin-bottom:8px;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
      gap:20px;
      margin-bottom:25px;
    }

    .card{
      background:white;
      padding:25px;
      border-radius:18px;
      text-align:center;
      box-shadow:0 5px 20px rgba(0,0,0,0.05);
    }

    .card h3{
      font-size:35px;
      color:#102a5c;
      margin-bottom:10px;
    }

    .card p{
      color:#666;
    }

    .courses{
      background:white;
      padding:25px;
      border-radius:18px;
      box-shadow:0 5px 20px rgba(0,0,0,0.05);
    }

    .course-item{
      padding:18px;
      border:1px solid #eee;
      border-radius:12px;
      margin-top:15px;
    }

    .progress{
      height:10px;
      background:#eee;
      border-radius:20px;
      margin-top:10px;
      overflow:hidden;
    }

    .progress span{
      display:block;
      height:100%;
      background:#d8b36a;
    }

    .logout-btn{
      background:#d8b36a;
      color:#102a5c;
      border:none;
      padding:12px 20px;
      border-radius:10px;
      cursor:pointer;
      font-weight:bold;
    }

  </style>
</head>

<body>

<div class="loading-screen" id="loadingScreen">
  <div class="spinner"></div>
  <h2>جاري تحميل بوابة المتدرب...</h2>
</div>

<div class="dashboard" id="dashboard">

  <div class="topbar">
    <h2>بوابة المتدرب — INEXC AI</h2>

    <button class="logout-btn" onclick="logout()">
      تسجيل الخروج
    </button>
  </div>

  <div class="user-box">

    <div class="avatar" id="avatar">
      A
    </div>

    <div class="user-info">
      <h2 id="studentName">
        Ahmed Ismail Anaqweh
      </h2>

      <p id="studentEmail">
        admin@inexc.com
      </p>
    </div>

  </div>

  <div class="stats">

    <div class="card">
      <h3>11</h3>
      <p>دورات حالية</p>
    </div>

    <div class="card">
      <h3>27</h3>
      <p>دورات مكتملة</p>
    </div>

    <div class="card">
      <h3>83%</h3>
      <p>نسبة التقدم</p>
    </div>

    <div class="card">
      <h3>2</h3>
      <p>شهادات</p>
    </div>

  </div>

  <div class="courses">

    <h2>الدورات الحالية</h2>

    <div class="course-item">
      <h3>دبلوم تطبيقات الذكاء الاصطناعي</h3>

      <p>التقدم: 83%</p>

      <div class="progress">
        <span style="width:83%"></span>
      </div>
    </div>

    <div class="course-item">
      <h3>دبلوم تطوير المعلم</h3>

      <p>التقدم: 45%</p>

      <div class="progress">
        <span style="width:45%"></span>
      </div>
    </div>

  </div>

</div>

<script>

function loadDashboard(){

  const user = JSON.parse(localStorage.getItem("trainee"));

  if(!user){

    window.location.href = "login.html";
    return;
  }

  document.getElementById("studentName").innerHTML = user.name;
  document.getElementById("studentEmail").innerHTML = user.email;

  document.getElementById("avatar").innerHTML =
    user.name.charAt(0).toUpperCase();

  setTimeout(() => {

    document.getElementById("loadingScreen").style.display = "none";

    document.getElementById("dashboard").style.display = "block";

  }, 1500);

}

function logout(){

  localStorage.removeItem("trainee");

  window.location.href = "login.html";

}

window.onload = loadDashboard;

</script>

</body>
</html>
