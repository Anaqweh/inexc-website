<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>فاتورة ضريبية — INEXC</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #1B2A4A;
      --border: #dde3ec;
      --text-muted: #64748b;
      --green: #059669;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Cairo", sans-serif; background: #eef1f6; color: var(--navy); padding: 24px; }
    .toolbar { max-width: 960px; margin: 0 auto 16px; display: flex; gap: 10px; justify-content: flex-end; }
    .toolbar button, .toolbar a { padding: 10px 18px; border-radius: 8px; border: none; font-family: inherit; font-weight: 700; cursor: pointer; text-decoration: none; font-size: 0.9rem; }
    .btn-print { background: var(--navy); color: #fff; }
    .btn-back  { background: #fff; color: var(--navy); border: 1px solid var(--border); }
    .invoice-page { max-width: 960px; margin: 0 auto; background: #fff; box-shadow: 0 8px 40px rgba(15,23,42,0.13); overflow: hidden; }

    /* HEADER */
    .company-header { display: flex; align-items: center; justify-content: center; gap: 24px; padding: 22px 40px 18px; border-bottom: 3px solid var(--navy); }
    .header-logo { display:inline-flex; align-items:center; justify-content:center; background:#1B2A4A; padding:10px 16px; border-radius:8px; line-height:0; }
    .header-logo img { height: 56px; width: auto; object-fit: contain; display: block; background: transparent; }
    .header-divider { width: 2px; height: 64px; background: var(--navy); opacity: 0.2; flex-shrink: 0; }
    .header-text { text-align: center; flex: 1; }
    .header-text .name-ar { font-size: 1.08rem; font-weight: 800; color: var(--navy); line-height: 1.55; text-align: center; margin-right: -80px; }
    .header-text .name-en { font-size: 0.72rem; color: var(--text-muted); margin-top: 5px; letter-spacing: 0.04em; line-height: 1.5; }
    .header-text .brand   { font-size: 1.45rem; font-weight: 800; letter-spacing: 0.38em; color: var(--navy); margin-top: 8px; }

    /* CONTACT BAR */
    .contact-bar { background: var(--navy); color: #fff; display: flex; flex-wrap: wrap; justify-content: center; gap: 22px; padding: 9px 20px; font-size: 0.78rem; }
    .contact-bar span { opacity: 0.95; }

    /* BODY */
    .invoice-body { padding: 28px 36px 24px; }
    .top-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; margin-bottom: 28px; }
    .invoice-title { font-size: 1.7rem; font-weight: 800; color: var(--navy); margin-bottom: 18px; line-height: 1.35; }
    .invoice-title small { display: block; font-size: 0.95rem; color: var(--text-muted); font-weight: 600; margin-top: 3px; }

    /* Trainee box */
    .trainee-box { border: 1.5px solid var(--border); border-radius: 10px; overflow: hidden; }
    .trainee-box-head { background: var(--navy); color: #fff; padding: 9px 16px; font-weight: 700; font-size: 0.88rem; }
    .trainee-row { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-bottom: 1px solid #f1f5f9; font-size: 0.87rem; }
    .trainee-row:last-child { border-bottom: none; }
    .trainee-row .ico { opacity: 0.55; width: 20px; flex-shrink: 0; text-align: center; }
    .trainee-row .lbl { color: var(--text-muted); min-width: 115px; }
    .trainee-row .val { font-weight: 600; }

    /* Meta list */
    .meta-list { display: flex; flex-direction: column; gap: 11px; }
    .meta-item { display: flex; align-items: center; gap: 10px; font-size: 0.87rem; }
    .meta-item .ico { width: 22px; text-align: center; opacity: 0.6; }
    .meta-item .lbl { color: var(--text-muted); min-width: 125px; }
    .meta-item .val { font-weight: 600; }
    .status-paid    { display: inline-block; background: rgba(5,150,105,0.12); color: var(--green); padding: 3px 14px; border-radius: 999px; font-weight: 700; font-size: 0.82rem; }
    .status-pending { display: inline-block; background: rgba(217,119,6,0.12); color: #d97706; padding: 3px 14px; border-radius: 999px; font-weight: 700; font-size: 0.82rem; }

    /* ITEMS TABLE */
    .items-table { width: 100%; border-collapse: collapse; margin-bottom: 24px; font-size: 0.87rem; }
    .items-table thead th { background: var(--navy); color: #fff; padding: 12px 16px; text-align: right; font-weight: 700; }
    .items-table thead th:first-child { width: 44px; text-align: center; }
    .items-table tbody td { padding: 14px 16px; border-bottom: 1px solid var(--border); vertical-align: top; }
    .items-table tbody td:first-child { text-align: center; font-weight: 700; color: var(--navy); }
    .item-title { font-weight: 700; margin-bottom: 4px; }
    .item-sub   { font-size: 0.78rem; color: var(--text-muted); line-height: 1.65; }

    /* BOTTOM SECTION */
    .bottom-section { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 28px; align-items: start; }
    .seal-wrap { display: flex; align-items: center; justify-content: center; padding: 10px; }
    .seal-wrap img { width: 190px; height: 190px; object-fit: contain; }
    .totals { font-size: 0.9rem; }
    .totals-row { display: flex; justify-content: space-between; padding: 9px 4px; border-bottom: 1px solid #f1f5f9; }
    .totals-row.grand { background: var(--navy); color: #fff; padding: 13px 16px; border-radius: 8px; margin-top: 10px; font-weight: 800; font-size: 1.1rem; border: none; }
    .amount-words { text-align: center; font-size: 0.82rem; color: var(--text-muted); margin-top: 10px; font-style: italic; direction: rtl; }

    /* FOOTER GRID */
    .footer-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px; padding-top: 22px; border-top: 1.5px solid var(--border); }
    .footer-block h4 { font-size: 0.9rem; font-weight: 700; margin-bottom: 10px; color: var(--navy); }
    .footer-block p  { font-size: 0.82rem; color: var(--text-muted); line-height: 1.75; }
    .signature-block { text-align: center; }
    .signature-block h4 { margin-bottom: 6px; }
    .signature-name  { font-size: 1.1rem; font-weight: 800; color: var(--navy); margin-top: 6px; }
    .signature-title { font-size: 0.8rem; color: var(--text-muted); margin-top: 3px; line-height: 1.55; }
    .license-no      { font-size: 0.75rem; color: var(--text-muted); margin-top: 5px; }

    /* BOTTOM BAR */
    .bottom-bar { background: var(--navy); color: #fff; display: flex; flex-wrap: wrap; justify-content: center; gap: 22px; padding: 10px 20px; font-size: 0.75rem; margin-top: 24px; }
    .loading, .error-box { max-width: 960px; margin: 60px auto; text-align: center; padding: 40px; background: #fff; border-radius: 12px; }
    .hidden { display: none !important; }
    @media print { body { background: #fff; padding: 0; } .toolbar { display: none !important; } .invoice-page { box-shadow: none; max-width: 100%; } }
    @media (max-width: 700px) { .top-grid, .bottom-section, .footer-grid { grid-template-columns: 1fr; } }
  </style>
</head>

    function escapeHtml(str) {

    function formatInvoiceDate(iso) {
      if (!iso) return '—';

    function buildInvoiceNumber(payment, seq) {

      return 'INV-INEXC-' + year + '-' + String(seq).padStart(6, '0');

    function buildRegNumber(regId) {
      if (!regId) return '—';

    function amountInArabicWords(amount) {
      const n = Math.floor(Number(amount) || 0);
      if (n === 0) return 'فقط صفر درهم إماراتي لا غير';
      const ones = ['','واحد','اثنان','ثلاثة','أربعة','خمسة','ستة','سبعة','ثمانية','تسعة'];
      const teens = ['عشرة','أحد عشر','اثنا عشر','ثلاثة عشر','أربعة عشر','خمسة عشر','ستة عشر','سبعة عشر','ثمانية عشر','تسعة عشر'];
      const tens = ['','','عشرون','ثلاثون','أربعون','خمسون','ستون','سبعون','ثمانون','تسعون'];
      const hundreds = ['','مائة','مائتان','ثلاثمائة','أربعمائة','خمسمائة','ستمائة','سبعمائة','ثمانمائة','تسعمائة'];
      function u1000(x) {
        if (!x) return '';
        if (x < 10) return ones[x];
        if (x < 20) return teens[x - 10];
        if (x < 100) { const t=Math.floor(x/10),o=x%10; return o?ones[o]+' و'+tens[t]:tens[t]; }
        const h=Math.floor(x/100),r=x%100; return r?hundreds[h]+' و'+u1000(r):hundreds[h];
      }
      function convert(x) {
        if (!x) return '';
        if (x < 1000) return u1000(x);
        if (x < 1000000) { const th=Math.floor(x/1000),r=x%1000; const w=th===1?'ألف':th===2?'ألفان':u1000(th)+' ألف'; return r?w+' و'+u1000(r):w; }
        const m=Math.floor(x/1000000),r=x%1000000; const w=m===1?'مليون':u1000(m)+' مليون'; return r?w+' و'+convert(r):w;
      }
      const w=convert(n); const dw=n===1?'درهم':n===2?'درهمان':n<=10?'دراهم':'درهم';
      return '(فقط ' + w + ' ' + dw + ' إماراتي لا غير)';
    }

      if (m==='card') return 'بطاقة';
      return m || 'Stripe';
