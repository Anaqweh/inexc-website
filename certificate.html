<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>التحقق من الشهادة — INEXC</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <link rel="stylesheet" href="css/inexc-logo.css">
  <style>
    :root {
      --navy: #1B2A4A;
      --gold: #C8A96E;
      --border: #e2e8f0;
      --text-muted: #64748b;
      --success: #059669;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Cairo', sans-serif;
      min-height: 100vh;
      background: linear-gradient(145deg, #0c1528, #1B2A4A 50%, #2E4A7A);
      padding: 32px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      width: 100%;
      max-width: 640px;
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.25);
    }
    .card-header {
      background: linear-gradient(135deg, var(--navy), #2E4A7A);
      color: #fff;
      text-align: center;
      padding: 32px 28px;
    }
    .card-header .brand {
      margin-bottom: 12px;
    }
    .card-header .brand img {
      height: 52px;
      width: auto;
      max-width: 240px;
      object-fit: contain;
      display: inline-block;
    }
    .card-header h1 {
      font-size: 1.15rem;
      font-weight: 700;
    }
    .card-header p {
      font-size: 0.88rem;
      opacity: 0.85;
      margin-top: 6px;
    }
    .card-body { padding: 32px 28px; }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.9rem;
      margin-bottom: 24px;
    }
    .status-badge.valid {
      background: rgba(5, 150, 105, 0.12);
      color: var(--success);
    }
    .status-badge.invalid {
      background: rgba(220, 38, 38, 0.1);
      color: #dc2626;
    }
    .detail-grid {
      display: grid;
      gap: 14px;
    }
    .detail-row {
      display: flex;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px dashed var(--border);
      font-size: 0.92rem;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-label {
      color: var(--text-muted);
      min-width: 130px;
      font-weight: 600;
    }
    .detail-value {
      color: var(--navy);
      font-weight: 700;
      flex: 1;
    }
    .cert-number {
      font-size: 1.1rem;
      letter-spacing: 0.04em;
      direction: ltr;
      text-align: right;
    }
    .loading, .error-msg {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
    }
    .cert-visual {
      margin: 24px 0;
      padding: 28px;
      border: 3px double var(--gold);
      border-radius: 12px;
      text-align: center;
      background: linear-gradient(180deg, #fafbfc, #fff);
    }
    .cert-visual h2 {
      color: var(--navy);
      font-size: 1.25rem;
      margin-bottom: 8px;
    }
    .cert-visual .trainee-name {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--navy);
      margin: 12px 0;
    }
    .cert-visual .course-name {
      color: var(--text-muted);
      font-size: 0.95rem;
    }
    .footer-note {
      text-align: center;
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-top: 20px;
      line-height: 1.7;
    }
    .search-box {
      margin-bottom: 20px;
    }
    .search-box input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.95rem;
    }
    .search-box button {
      margin-top: 10px;
      width: 100%;
      padding: 12px;
      background: var(--navy);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <div class="brand">
        <img src="assets/images/inexc-logo-white.png" data-fallback="assets/inexc-logo-white.png" alt="INEXC — Innovative Excellence" class="inexc-logo inexc-logo--sm" onerror="if(!this.dataset.fallbackTried&&this.dataset.fallback){this.dataset.fallbackTried='1';this.src=this.dataset.fallback}else{this.style.display='none'}">
      </div>
      <h1>التحقق من الشهادة</h1>
      <p>منصة التميز الابتكاري للتعليم والتدريب</p>
    </div>
    <div class="card-body" id="content">
      <div class="loading" id="loading">جاري التحقق من الشهادة...</div>
    </div>
  </div>

  <script>
    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }

    function formatDate(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleDateString('ar-SA', {
        day: 'numeric', month: 'long', year: 'numeric'
      });
    }

    function renderValid(cert) {
      document.getElementById('content').innerHTML = `
        <div class="status-badge valid">✓ شهادة صحيحة ومسجّلة في النظام</div>
        <div class="cert-visual">
          <h2>${escapeHtml(cert.certificate_type || 'شهادة إتمام')}</h2>
          <div class="trainee-name">${escapeHtml(cert.trainee_name)}</div>
          <div class="course-name">${escapeHtml(cert.course_name)}</div>
        </div>
        <div class="detail-grid">
          <div class="detail-row">
            <span class="detail-label">رقم الشهادة</span>
            <span class="detail-value cert-number">${escapeHtml(cert.certificate_number)}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">تاريخ الإصدار</span>
            <span class="detail-value">${formatDate(cert.created_at)}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">البريد</span>
            <span class="detail-value" dir="ltr">${escapeHtml(cert.trainee_email || '—')}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">الحالة</span>
            <span class="detail-value">${escapeHtml(cert.status === 'issued' ? 'صادرة' : cert.status)}</span>
          </div>
        </div>
        <p class="footer-note">تم التحقق من هذه الشهادة عبر نظام INEXC الرسمي.<br>info@inexc.com · inexc.com</p>`;
    }

    function renderInvalid(code) {
      document.getElementById('content').innerHTML = `
        <div class="status-badge invalid">✗ لم يتم العثور على الشهادة</div>
        <p style="color:var(--text-muted);margin-bottom:20px;line-height:1.8;">
          الرقم <strong dir="ltr">${escapeHtml(code || '')}</strong> غير مسجّل في نظامنا.
        </p>
        <div class="search-box">
          <input type="text" id="manualCode" placeholder="أدخل رقم الشهادة للتحقق" dir="ltr">
          <button type="button" onclick="verifyManual()">تحقق</button>
        </div>`;
    }

    function renderSearchOnly() {
      document.getElementById('content').innerHTML = `
        <p style="color:var(--text-muted);margin-bottom:16px;line-height:1.8;">أدخل رقم الشهادة للتحقق من صحتها.</p>
        <div class="search-box">
          <input type="text" id="manualCode" placeholder="مثال: INEXC-2026-123456" dir="ltr">
          <button type="button" onclick="verifyManual()">تحقق من الشهادة</button>
        </div>`;
    }

    async function verifyCode(code) {
      if (!code) {
        renderSearchOnly();
        return;
      }

      document.getElementById('content').innerHTML = '<div class="loading">جاري التحقق...</div>';

      const { data, error } = await supabaseClient
        .from('certificates')
        .select('*')
        .eq('certificate_number', code.trim())
        .maybeSingle();

      if (error) {
        document.getElementById('content').innerHTML = '<div class="error-msg">تعذّر الاتصال بالنظام. حاول لاحقًا.</div>';
        return;
      }

      if (data) {
        renderValid(data);
      } else {
        renderInvalid(code);
      }
    }

    window.verifyManual = function() {
      const code = document.getElementById('manualCode')?.value?.trim();
      if (code) {
        history.replaceState(null, '', '?code=' + encodeURIComponent(code));
        verifyCode(code);
      }
    };

    const params = new URLSearchParams(location.search);
    verifyCode(params.get('code'));
  </script>
<script src="whatsapp-float.js"></script>
</body>
</html>
